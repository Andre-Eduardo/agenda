packages:
  - 'apps/**'
  - 'packages/**'
  - 'test/**'
  - 'e2e'

allowBuilds:
  '@nestjs/core': false
  '@parcel/watcher': false
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': false
  '@swc/core': true
  core-js: false
  esbuild: true
  msw: true
  prisma: true
  protobufjs: true

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - '@swc/core'
  - esbuild
  - prisma
